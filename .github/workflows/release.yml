name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: video-splitter.exe
            asset_name: video-splitter-x86_64-windows.exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: video-splitter
            asset_name: video-splitter-x86_64-linux
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: video-splitter
            asset_name: video-splitter-x86_64-macos

    steps:
      - uses: actions/checkout@v4

      # ── Windows ──────────────────────────────────────────────
      - name: Install LLVM & CMake (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: choco install llvm cmake -y

      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      # ── Linux ─────────────────────────────────────────────────
      - name: Install LLVM & CMake (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev cmake

      # ── macOS ─────────────────────────────────────────────────
      - name: Install LLVM & CMake (macOS)
        if: matrix.os == 'macos-13'
        run: brew install llvm cmake

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.os == 'macos-13'
        run: echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      # ── Rust ──────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Build ─────────────────────────────────────────────────
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ───────────────────────────────────────────────
      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"

      # ── Upload to GitHub Release ──────────────────────────────
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
